<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | Loughborough Housing Corporation</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">

<style>
  body { 
    font-family: 'Merriweather', serif; 
  }
</style>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
			  page: '#ecf3ee',
              light: '#f0fdf4', 
              DEFAULT: '#166534', 
              dark: '#14532d',    
              deep: '#064e3b',    
              accent: '#dcfce7',  
            },
          }
        }
      }
    }
  </script>
</head>

<body class="bg-brand-page">

<nav class="bg-white/90 backdrop-blur sticky top-0 z-50 border-b">
  <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-brand-deep">Loughborough Housing Corporation</h1>

    <div class="hidden md:flex space-x-6 text-sm font-medium">
      <a href="index.html" class="hover:text-brand transition">Home</a>
      <a href="about.html" class="hover:text-brand transition">About</a>
      <a href="gallery.html" class="hover:text-brand transition">Gallery</a>
      <a href="faq.html" class="hover:text-brand transition">FAQ</a>
	  <a href="apply.html" class="hover:text-brand transition">Apply</a>
	  <a href="resources.html" class="hover:text-brand transition">Resources</a>
      <a href="contact.html" class="bg-brand text-white px-4 py-2 rounded-lg hover:bg-brand-dark transition">
        Contact
      </a>
    </div>

    <button id="menuBtn" class="md:hidden text-2xl text-brand">☰</button>
  </div>

  <div id="mobileMenu" class="hidden md:hidden px-4 pb-4 space-y-2 bg-white">
    <a href="index.html" class="block py-2">Home</a>
    <a href="about.html" class="block py-2">About</a>
    <a href="gallery.html" class="block py-2 font-bold text-brand">Gallery</a>
	<a href="faq.html" class="block py-2">FAQ</a>
    <a href="apply.html" class="block py-2 font-bold text-brand">Apply</a>
	<a href="resources.html" class="block py-2 font-bold text-brand">Resources</a>
    <a href="contact.html" class="block py-2 text-brand font-semibold">Contact</a>
  </div>
</nav>

<section class="max-w-6xl mx-auto px-4 py-20">
  <div class="mb-10">
    <h1 class="text-3xl font-bold text-brand-deep">Apartment Gallery</h1>
    <p class="text-gray-600 mt-2">A look inside our senior independent living spaces.</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-8">

    <div class="group relative">
      <img src="images/apt1.jpg" class="rounded-2xl shadow-md group-hover:shadow-xl group-hover:ring-4 group-hover:ring-brand-accent transition-all duration-300 w-full h-64 object-cover">
      <div class="mt-3 text-center opacity-0 group-hover:opacity-100 transition-opacity">
        <p class="text-sm font-semibold text-brand">Living Area</p>
      </div>
    </div>

    <div class="group relative">
      <img src="images/apt2.jpg" class="rounded-2xl shadow-md group-hover:shadow-xl group-hover:ring-4 group-hover:ring-brand-accent transition-all duration-300 w-full h-64 object-cover">
      <div class="mt-3 text-center opacity-0 group-hover:opacity-100 transition-opacity">
        <p class="text-sm font-semibold text-brand">Modern Kitchen</p>
      </div>
    </div>

    <div class="group relative">
      <img src="images/apt3.jpg" class="rounded-2xl shadow-md group-hover:shadow-xl group-hover:ring-4 group-hover:ring-brand-accent transition-all duration-300 w-full h-64 object-cover">
      <div class="mt-3 text-center opacity-0 group-hover:opacity-100 transition-opacity">
        <p class="text-sm font-semibold text-brand">Bedroom View</p>
      </div>
    </div>

  </div>
</section>

<footer class="bg-brand-page border-t mt-20">
  <div class="max-w-6xl mx-auto px-4 py-8 text-center text-gray-500 text-sm">
    © 2026 Loughborough Housing Corporation.
  </div>
</footer>

<script>
const btn = document.getElementById('menuBtn');
const menu = document.getElementById('mobileMenu');

btn.addEventListener('click', () => {
  menu.classList.toggle('hidden');
});
</script>
</body>
</html>
