<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loughborough Housing Corporation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">

<style>
  body { 
    font-family: 'Merriweather', serif; 
  }
</style>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
			  page: '#ecf3ee',
              light: '#f0fdf4', // Very light green for backgrounds
              DEFAULT: '#166534', // Main professional green (WCAG Accessible)

              deep: '#064e3b',    // Deep forest green for gradients
              accent: '#dcfce7',  // Soft accent for text highlights
            },
          }
        }
      }
    }
  </script>
</head>

<body class="bg-brand-page text-gray-900">

<nav class="bg-white/90 backdrop-blur sticky top-0 z-50 border-b">
  <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-brand-deep">Loughborough Housing Corporation</h1>

    <div class="hidden md:flex space-x-6 text-sm font-medium">
      <a href="index.html" class="hover:text-brand transition">Home</a>
      <a href="about.html" class="hover:text-brand transition">About</a>
      <a href="gallery.html" class="hover:text-brand transition">Gallery</a>
      <a href="faq.html" class="hover:text-brand transition">FAQ</a>
	  <a href="apply.html" class="hover:text-brand transition">Apply</a>
	  <a href="resources.html" class="hover:text-brand transition">Resources</a>
      <a href="contact.html" class="bg-brand text-white px-4 py-2 rounded-lg hover:bg-brand-dark transition">

      </a>
    </div>

    <a href="index.html" class="block py-2">Home</a>
    <a href="about.html" class="block py-2">About</a>
    <a href="gallery.html" class="block py-2 font-bold text-brand">Gallery</a>
	<a href="faq.html" class="block py-2">FAQ</a>
    <a href="apply.html" class="block py-2 font-bold text-brand">Apply</a>

  </div>
</nav>

<section class="relative bg-gradient-to-br from-brand to-brand-deep text-white py-24 text-center px-4">

    Loughborough Housing Corporation<br class="hidden md:block"/> Sydenham's Senior Independent Living Since 1985

  <div class="mt-8 flex justify-center gap-4 flex-wrap">

      Contact
    </a>
    <a href="about.html" class="border border-white text-white px-6 py-3 rounded-xl hover:bg-white hover:text-brand transition">
      About Us
    </a>
  </div>

</section>

<footer class="bg-brand-page border-t mt-20">
  <div class="max-w-6xl mx-auto px-4 py-8 text-center text-gray-500 text-sm">
    © 2026 Loughborough Housing Corporation.
  </div>
</footer>

<script>
  const btn = document.getElementById('menuBtn');
  const menu = document.getElementById('mobileMenu');

  btn.addEventListener('click', () => {
    menu.classList.toggle('hidden');
  });
</script>

</body>
</html>
